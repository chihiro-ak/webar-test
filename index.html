<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
/* ===============================
   瞬き
=============================== */
window.addEventListener("DOMContentLoaded", () => {
  const target0 = document.querySelector("#target0");
  const blinkPlane = document.querySelector("#blinkPlane");

  const frames = [
    "images/01.webp","images/02.webp","images/03.webp",
    "images/04.webp","images/05.webp",
    "images/04.webp","images/03.webp","images/02.webp","images/01.webp"
  ];

  let i = 0, timer = null;

  const play = () => {
    i = 0;
    const step = () => {
      blinkPlane.setAttribute("material","src",frames[i++]);
      if (i < frames.length) setTimeout(step,120);
    };
    step();
  };

  target0.addEventListener("targetFound", () => {
    play();
    timer = setInterval(play, 2000);
  });

  target0.addEventListener("targetLost", () => {
    clearInterval(timer);
    blinkPlane.setAttribute("material","src",frames[0]);
  });
});


window.addEventListener("DOMContentLoaded", () => {
  const target4 = document.querySelector("#target4");
  const gifVideo = document.querySelector("#gif5");

  if (!gifVideo) return;

  target4.addEventListener("targetFound", async () => {
    try {
      await gifVideo.play();
    } catch (e) {
      console.warn('video play failed:', e);
    }
  });

  target4.addEventListener("targetLost", () => {
    try {
      gifVideo.pause();
      gifVideo.currentTime = 0;
    } catch (e) {}
  });
});

/* ===============================
   撮影（AR確実反映版）
=============================== */
const btn = document.getElementById("captureButton");
const out = document.getElementById("captureCanvas");

btn.addEventListener("click", () => {
  const scene = document.querySelector("a-scene");
  const gl = scene.renderer.domElement;
  const video = document.querySelector("video");

  if (!video || video.videoWidth === 0) return;

  // ✅ 次の描画フレームを2回待つ（重要）
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      out.width = gl.width;
      out.height = gl.height;

      const ctx = out.getContext("2d");

      // 背景カメラ
      ctx.drawImage(video, 0, 0, out.width, out.height);
      // AR（WebGL）
      ctx.drawImage(gl, 0, 0, out.width, out.height);

      out.toBlob(async (blob) => {
        const file = new File([blob], "ar_photo.png", { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: "AR Photo" });
        } else {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "ar_photo.png";
          a.click();
        }
      });
    });
  });
});
</script>
